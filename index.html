<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>BMI Calculator</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f4f6f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
width:320px;
text-align:center;
}

h1{
margin-bottom:20px;
}

input{
width:90%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
margin-top:10px;
background:#4CAF50;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

.result{
margin-top:20px;
font-size:18px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="card">

<h1>BMI Calculator</h1>

<input type="number" id="weight" placeholder="น้ำหนัก (kg)">
<input type="number" id="height" placeholder="ส่วนสูง (cm)">

<button onclick="calculateBMI()">คำนวณ BMI</button>

<div class="result" id="result"></div>

</div>

<script>

function calculateBMI(){

let weight = document.getElementById("weight").value
let height = document.getElementById("height").value

if(weight=="" || height==""){
document.getElementById("result").innerHTML="กรุณากรอกข้อมูล"
return
}

height = height/100

let bmi = weight/(height*height)

let status=""

if(bmi < 18.5){
status="น้ำหนักต่ำกว่าเกณฑ์"
}
else if(bmi < 23){
status="สมส่วน"
}
else if(bmi < 25){
status="น้ำหนักเกิน"
}
else if(bmi < 30){
status="อ้วนระดับ 1"
}
else{
status="อ้วนระดับ 2"
}

document.getElementById("result").innerHTML=
"BMI = "+bmi.toFixed(2)+"<br>"+status

}

</script>

</body>
</html>
